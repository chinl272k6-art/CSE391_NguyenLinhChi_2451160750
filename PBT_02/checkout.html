<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>

<h1>Đặt hàng</h1>

<!-- PHẦN 1: GIỎ HÀNG -->
<h2>Giỏ hàng</h2>

<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>iPhone 16</td>
            <td>20.000.000</td>
            <td>1</td>
            <td>20.000.000</td>
        </tr>

        <tr>
            <td>2</td>
            <td>AirPods Pro</td>
            <td>5.000.000</td>
            <td>2</td>
            <td>10.000.000</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Apple Watch</td>
            <td>8.000.000</td>
            <td>1</td>
            <td>8.000.000</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="4"><strong>Tổng cộng</strong></td>
            <td><output>38.000.000</output></td>
        </tr>
    </tfoot>
</table>

<br>

<!-- BONUS: DATALIST -->
<label for="search">Tìm sản phẩm:</label><br>
<input list="products" id="search" placeholder="Nhập tên sản phẩm">
<datalist id="products">
    <option value="iPhone 16">
    <option value="AirPods Pro">
    <option value="Apple Watch">
</datalist>

<br><br>

<!-- PHẦN 2: THANH TOÁN -->
<form action="#" method="POST">

<h2>Thanh toán</h2>

Phương thức thanh toán:<br>
<input type="radio" id="cod" name="payment" value="cod" required>
<label for="cod">COD</label>

<input type="radio" id="bank" name="payment" value="bank">
<label for="bank">Chuyển khoản</label>

<input type="radio" id="ewallet" name="payment" value="ewallet">
<label for="ewallet">Ví điện tử</label>

<br><br>

<label for="coupon">Mã giảm giá:</label><br>
<input type="text" id="coupon" name="coupon"
       placeholder="SALE2026"
       pattern="^SALE[0-9]{4}$">

<br><br>

<label for="note">Ghi chú:</label><br>
<textarea id="note" name="note" rows="3"
          placeholder="Ghi chú thêm..."></textarea>

<br><br>

<!-- PHẦN 3: GIAO HÀNG -->
<h2>Thông tin giao hàng</h2>

<label for="delivery-date">Ngày giao hàng:</label><br>
<input type="date" id="delivery-date" name="delivery-date"
       min="2026-04-23" required>

<br><br>

<label for="time-slot">Khung giờ:</label><br>
<select id="time-slot" name="time-slot" required>
    <option value="">-- Chọn khung giờ --</option>
    <option>Sáng (8-12h)</option>
    <option>Chiều (14-18h)</option>
    <option>Tối (18-21h)</option>
</select>

<br><br>

<label for="days">Thời gian giao (ngày):</label><br>
<input type="range" id="days" name="days"
       min="1" max="7" step="1">

<br><br>

<!-- BONUS: PROGRESS -->
<label>Điểm tích lũy:</label><br>
<meter value="70" min="0" max="100"></meter>

<br><br>

<button type="submit" aria-label="Xác nhận đặt hàng">
    Đặt hàng
</button>

</form>

</body>
</html>
