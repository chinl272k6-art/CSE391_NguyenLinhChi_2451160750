<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia Sản phẩm</title>
</head>
<body>

<h1>Giới thiệu sản phẩm</h1>

<!-- Ảnh sản phẩm -->
<h2>Sản phẩm nổi bật</h2>

<figure>
    <img src="img1.jpg" alt="iPhone 16 Pro Max màu titan, hiển thị mặt trước và camera"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>iPhone 16 Pro Max - Thiết kế cao cấp</figcaption>
</figure>

<figure>
    <img src="img2.jpg" alt="iPhone 16 mặt sau với cụm camera nâng cấp"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Camera chất lượng cao</figcaption>
</figure>

<figure>
    <img src="img3.jpg" alt="iPhone 16 hiển thị màn hình sáng, giao diện iOS mới"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Màn hình sắc nét</figcaption>
</figure>

<!-- Video YouTube -->
<h2>Video giới thiệu (YouTube)</h2>

<iframe width="560" height="315"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    title="Video giới thiệu sản phẩm"
    frameborder="0"
    allowfullscreen>
</iframe>

<!-- Video local -->
<h2>Video sản phẩm</h2>

<video controls poster="poster.jpg" style="max-width:100%; height:auto;">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt của bạn không hỗ trợ video.
</video>

<!-- Audio -->
<h2>Nhạc nền</h2>

<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt của bạn không hỗ trợ audio.
</audio>

<!-- SVG -->
<h2>Logo (SVG)</h2>

<svg width="120" height="120">
    <circle cx="60" cy="60" r="50" stroke="black" stroke-width="2" fill="lightblue" />
    <text x="50%" y="55%" text-anchor="middle" fill="black" font-size="14">
        LOGO
    </text>
</svg>

</body>
</html>
