<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">My Shop</div>

        <div class="hamburger">☰</div>

        <nav>
            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Sale</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h3>Filter</h3>

        <select>
            <option>All Categories</option>
            <option>Shoes</option>
            <option>Phones</option>
            <option>Fashion</option>
        </select>
    </aside>

    <!-- Product Grid -->
    <main class="products">

        <div class="card">
            <img src="https://picsum.photos/200?1">
            <h3>Product 1</h3>
            <p>$100</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/200?2">
            <h3>Product 2</h3>
            <p>$120</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/200?3">
            <h3>Product 3</h3>
            <p>$90</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/200?4">
            <h3>Product 4</h3>
            <p>$80</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/200?5">
            <h3>Product 5</h3>
            <p>$150</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/200?6">
            <h3>Product 6</h3>
            <p>$110</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/200?7">
            <h3>Product 7</h3>
            <p>$95</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/200?8">
            <h3>Product 8</h3>
            <p>$130</p>
        </div>

    </main>

    <!-- Ads -->
    <aside class="ads">
        <h3>Advertisement</h3>
        <p>Sale up to 50%</p>
    </aside>

</div>

<footer>
    <p>© 2026 My Shop</p>
</footer>

</body>
</html>
