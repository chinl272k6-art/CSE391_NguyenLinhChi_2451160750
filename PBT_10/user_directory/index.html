<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory CRUD</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>User Directory</h1>

        <!-- Search -->
        <input
            type="text"
            id="searchInput"
            placeholder="Search by name or email"
        >

        <!-- Form -->
        <form id="userForm">

            <input
                type="text"
                id="name"
                placeholder="Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <button type="submit">
                Save User
            </button>

        </form>

        <!-- Toast -->
        <div id="toast"></div>

        <!-- Loading -->
        <div id="loading" class="hidden">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <!-- Users -->
        <div id="usersContainer"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
