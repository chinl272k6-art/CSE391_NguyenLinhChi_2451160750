<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Layout E-Commerce</title>

  <link rel="stylesheet" href="grid.css">
</head>
<body>

  <div class="container">

    <!-- ================= HEADER ================= -->

    <header class="header">
      <h1>E-Commerce Store</h1>
    </header>

    <!-- ================= HERO ================= -->

    <section class="hero">
      <div class="hero-text">
        <h2>Big Sale 50% OFF</h2>
        <p>Discover amazing products today</p>
        <button>Shop Now</button>
      </div>
    </section>

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">
      <h2>Filters</h2>

      <label><input type="checkbox"> Electronics</label>
      <label><input type="checkbox"> Fashion</label>
      <label><input type="checkbox"> Shoes</label>
      <label><input type="checkbox"> Watches</label>
      <label><input type="checkbox"> Accessories</label>
    </aside>

    <!-- ================= MAIN CONTENT ================= -->

    <main class="main">

      <div class="products">

        <!-- FEATURED PRODUCT -->
        <div class="card featured">
          <img src="https://picsum.photos/600/300?1" alt="product">

          <div class="info">
            <h3>Featured Product</h3>
            <p>$499</p>
          </div>

          <button>Buy Now</button>
        </div>

        <!-- NORMAL PRODUCTS -->

        <div class="card">
          <img src="https://picsum.photos/300/200?2" alt="product">

          <div class="info">
            <h3>Product 2</h3>
            <p>$120</p>
          </div>

          <button>Buy Now</button>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?3" alt="product">

          <div class="info">
            <h3>Product 3</h3>
            <p>$180</p>
          </div>

          <button>Buy Now</button>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?4" alt="product">

          <div class="info">
            <h3>Product 4</h3>
            <p>$90</p>
          </div>

          <button>Buy Now</button>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?5" alt="product">

          <div class="info">
            <h3>Product 5</h3>
            <p>$220</p>
          </div>

          <button>Buy Now</button>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?6" alt="product">

          <div class="info">
            <h3>Product 6</h3>
            <p>$300</p>
          </div>

          <button>Buy Now</button>
        </div>

      </div>

    </main>

    <!-- ================= ADS ================= -->

    <aside class="ads">
      <h2>Advertisement</h2>

      <img
        src="https://picsum.photos/200/500"
        alt="ads"
      >
    </aside>

    <!-- ================= FOOTER ================= -->

    <footer class="footer">
      <p>© 2026 E-Commerce Store</p>
    </footer>

  </div>

</body>
</html>
